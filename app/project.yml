# =============================================================================
# project.yml — xcodegen project specification for FreeVoice
# =============================================================================
# Install xcodegen:  brew install xcodegen
# Generate project:  cd app && xcodegen generate
# Open in Xcode:     open FreeVoice.xcodeproj
#
# After generating, open the project in Xcode and set your Apple Developer
# Team under: FreeVoice target → Signing & Capabilities → Team.
# =============================================================================

name: FreeVoice

options:
  bundleIdPrefix: com.freevoice
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true  # reflects the StatusBar/ Hotkey/ folder grouping

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  FreeVoice:
    type: application
    platform: macOS
    deploymentTarget: "13.0"

    sources:
      - path: Sources/FreeVoice

    # Bundle whisper-cli + its dylibs for zero-dependency distribution.
    # postBuildScript copies + signs each binary with hardened runtime (required
    # for notarization). The resources: folder-reference approach generates no
    # build phase and was silently omitting all files from the archive.
    postBuildScripts:
      - name: "Embed and Sign whisper-cli"
        script: |
          set -e
          DEST="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Resources"
          mkdir -p "$DEST"
          cp -f "$SRCROOT/Resources/whisper-cli" "$DEST/"
          cp -f "$SRCROOT/Resources/"*.dylib "$DEST/"
          cp -f "$SRCROOT/Resources/ggml-tiny.en.bin" "$DEST/"
          chmod +x "$DEST/whisper-cli"
          if [ "$CONFIGURATION" = "Release" ]; then
            TIMESTAMP="--timestamp"
          else
            TIMESTAMP=""
          fi
          for f in "$DEST"/lib*.dylib "$DEST/whisper-cli"; do
            /usr/bin/codesign --force \
              --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
              --options runtime \
              $TIMESTAMP \
              "$f"
          done
        basedOnDependencyAnalysis: false
        showEnvVarsInLog: false

    # xcodegen generates Info.plist and .entitlements at these paths.
    # Running `xcodegen generate` will (re)create them from the properties below.
    info:
      path: Sources/FreeVoice/Info.plist
      properties:
        CFBundleName: FreeVoice
        CFBundleDisplayName: FreeVoice
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        # Hide the Dock icon — FreeVoice lives entirely in the menu bar.
        LSUIElement: YES
        # Required by App Store / notarization (TCC prompt copy).
        NSMicrophoneUsageDescription: "FreeVoice uses your microphone to record speech for transcription."

    entitlements:
      path: Sources/FreeVoice/FreeVoice.entitlements
      properties:
        # Microphone access (AVAudioRecorder, Phase 2).
        com.apple.security.device.audio-input: true
        # Required to send Cmd+V via System Events for auto-paste (Phase 2).
        com.apple.security.automation.apple-events: true

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freevoice.app
        # Hardened runtime is required for notarization.
        ENABLE_HARDENED_RUNTIME: YES
        # Set your 10-character Team ID here (find it at developer.apple.com →
        # Account → Membership). Xcode also persists it in the xcodeproj.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "886D5PCVJY"
        # App icon from Assets.xcassets
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
